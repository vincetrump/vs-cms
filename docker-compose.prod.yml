services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: vs-cms

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3001"
    depends_on:
      - mongo
    environment:
      MONGODB_URI: mongodb://mongo:27017/vs-cms
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: 24h
      TOTP_ENCRYPTION_KEY: ${TOTP_ENCRYPTION_KEY}
      SSH_PRIVATE_KEY_PATH: /root/.ssh/id_rsa
      SSH_DEFAULT_SERVER: 68.183.188.19
      SSH_DEFAULT_USER: root
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      API_PORT: "3001"
      ADMIN_URL: https://vs-cms.sonkemmiracleapo.com
    volumes:
      - /root/.ssh/id_rsa:/root/.ssh/id_rsa:ro

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    ports:
      - "127.0.0.1:5174:80"
    depends_on:
      - api

  seed:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      - mongo
    environment:
      MONGODB_URI: mongodb://mongo:27017/vs-cms
      JWT_SECRET: ${JWT_SECRET}
      TOTP_ENCRYPTION_KEY: ${TOTP_ENCRYPTION_KEY}
    command: ["node", "dist/seed.js"]
    profiles:
      - seed

volumes:
  mongo-data:
